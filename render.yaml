services:
  - type: web
    name: simpleoj
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Quản trị viên
      - key: JUDGE_SERVICE_TOKEN
        generateValue: true
      - key: TERMINAL_PROCESS_TIMEOUT_MS
        value: "60000"
      - key: TERMINAL_SESSION_TIMEOUT_MS
        value: "600000"
      - key: TERMINAL_MAX_OUTPUT_BYTES
        value: "100000"
